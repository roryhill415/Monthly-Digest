<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cthulhu Ventures — Weekly News Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --dark: #0f1923;
    --mid: #1e2d3d;
    --text: #e8e0d0;
    --muted: rgba(232,224,208,0.45);
    --border: rgba(201,168,76,0.18);
    --card-bg: rgba(30,45,61,0.6);
    --green: #2d6a4f;
    --red: #9b2335;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 70% -10%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 90%, rgba(30,80,60,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .shell { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 48px 32px 80px; }

  /* Header */
  .header { margin-bottom: 40px; }
  .header-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
  }
  .header-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 36px; font-weight: 400; line-height: 1.1;
    color: var(--text); margin-bottom: 6px;
  }
  .header-title em { color: var(--gold); font-style: italic; }
  .header-sub { font-size: 13px; color: var(--muted); font-weight: 300; }

  /* Controls bar */
  .controls {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px; flex-wrap: wrap;
  }
  .btn-run {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 24px; background: var(--gold); color: var(--dark);
    border: none; border-radius: 4px; font-size: 13px; font-weight: 600;
    font-family: 'IBM Plex Sans', sans-serif; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-run:hover { opacity: 0.88; }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy {
    display: none; align-items: center; gap: 8px;
    padding: 11px 20px; background: transparent; color: var(--gold);
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; font-weight: 500; font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-copy:hover { background: rgba(201,168,76,0.08); }
  .btn-copy.show { display: flex; }
  .btn-copy.copied { color: #2d6a4f; border-color: rgba(45,106,79,0.4); }

  .run-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted); margin-left: auto;
  }

  /* Progress */
  .progress-wrap { display: none; margin-bottom: 28px; }
  .progress-wrap.show { display: block; }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted); margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .progress-bar-bg {
    height: 2px; background: rgba(201,168,76,0.15); border-radius: 1px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold); border-radius: 1px;
    width: 0%; transition: width 0.4s ease;
  }

  /* Company config section */
  .config-section { margin-bottom: 32px; }
  .config-toggle {
    display: flex; align-items: center; gap: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--muted); cursor: pointer; user-select: none;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: none; border: none; padding: 0;
  }
  .config-toggle:hover { color: var(--text); }
  .config-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .config-toggle.open .arrow { transform: rotate(90deg); }
  .config-body { display: none; margin-top: 16px; }
  .config-body.open { display: block; }

  .config-grid { display: flex; flex-direction: column; gap: 6px; }
  .config-row {
    display: grid; grid-template-columns: 200px 1fr auto;
    gap: 10px; align-items: center;
    padding: 10px 14px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 4px;
  }
  .config-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .config-context {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    background: rgba(15,25,35,0.6); border: 1px solid rgba(201,168,76,0.12);
    border-radius: 3px; color: var(--text); padding: 5px 9px;
    width: 100%; outline: none;
  }
  .config-context:focus { border-color: rgba(201,168,76,0.35); }
  .config-context::placeholder { color: rgba(232,224,208,0.25); }
  .config-enabled {
    width: 16px; height: 16px; cursor: pointer; accent-color: var(--gold);
  }

  /* Results */
  .results { display: flex; flex-direction: column; gap: 12px; }

  .result-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card.has-news { border-left: 3px solid var(--gold); }
  .result-card.no-news  { border-left: 3px solid rgba(232,224,208,0.15); opacity: 0.7; }
  .result-card.loading  { border-left: 3px solid rgba(201,168,76,0.3); }

  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid rgba(201,168,76,0.1);
  }
  .result-co-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .result-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    padding: 2px 8px; border-radius: 3px; font-weight: 500; letter-spacing: 0.06em;
  }
  .badge-hits { background: rgba(201,168,76,0.15); color: var(--gold); }
  .badge-none { background: rgba(232,224,208,0.07); color: var(--muted); }
  .badge-loading {
    background: rgba(201,168,76,0.08); color: rgba(201,168,76,0.5);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .result-body { padding: 14px 16px; }

  .news-item { margin-bottom: 14px; }
  .news-item:last-child { margin-bottom: 0; }
  .news-headline {
    font-size: 13px; font-weight: 500; color: var(--text);
    margin-bottom: 3px; line-height: 1.4;
  }
  .news-headline a { color: var(--gold); text-decoration: none; }
  .news-headline a:hover { text-decoration: underline; }
  .news-source {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted); margin-bottom: 5px;
  }
  .news-summary { font-size: 12px; color: rgba(232,224,208,0.7); line-height: 1.65; }

  .news-divider { border: none; border-top: 1px solid rgba(201,168,76,0.1); margin: 12px 0; }

  /* No-news collapsed section */
  .no-news-section { margin-top: 16px; }
  .no-news-toggle {
    display: flex; align-items: center; gap: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted); cursor: pointer; user-select: none;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: none; border: none; padding: 8px 0;
  }
  .no-news-toggle:hover { color: var(--text); }
  .no-news-chips { display: none; flex-wrap: wrap; gap: 6px; padding: 8px 0; }
  .no-news-chips.open { display: flex; }
  .no-news-chip {
    font-size: 11px; padding: 3px 10px;
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--muted);
  }

  /* Error */
  .error-banner {
    display: none; padding: 10px 14px;
    background: rgba(155,35,53,0.15); border: 1px solid rgba(155,35,53,0.3);
    border-radius: 4px; font-size: 12px; color: #e07080; margin-bottom: 16px;
  }
  .error-banner.show { display: block; }

  /* Divider rule */
  .rule { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="header-eyebrow">Cthulhu Ventures LLC</div>
    <h1 class="header-title">Weekly <em>News</em> Digest</h1>
    <p class="header-sub">Portfolio press mentions — monthly · powered by web search</p>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="controls">
    <button class="btn-run" id="btnRun" onclick="runDigest()">
      <span>▶</span> Run Monthly Digest
    </button>
    <button class="btn-copy" id="btnCopy" onclick="copyEmail()">
      <span>✉</span> Copy Email
    </button>
    <span class="run-meta" id="runMeta"></span>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressLabel">Searching...</span>
      <span id="progressCount"></span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <!-- Config -->
  <div class="config-section">
    <button class="config-toggle" id="configToggle" onclick="toggleConfig()">
      <span class="arrow">▶</span> Company Search Config
    </button>
    <div class="config-body" id="configBody">
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;">
        Edit the search context for each company to improve result accuracy. Add founder names, key products, or disambiguating terms. Uncheck to skip a company.
      </p>
      <div class="config-grid" id="configGrid"></div>
    </div>
  </div>

  <hr class="rule" />

  <div class="results" id="results"></div>
  <div class="no-news-section" id="noNewsSection" style="display:none;">
    <button class="no-news-toggle" onclick="toggleNoNews()">
      <span id="noNewsArrow">▶</span> No mentions this week (<span id="noNewsCount">0</span>)
    </button>
    <div class="no-news-chips" id="noNewsChips"></div>
  </div>

</div>

<script>
// ─── COMPANY LIST ────────────────────────────────────────────────────────────
// Edit searchContext to tune search quality. Add founder names, products, etc.
const COMPANIES = [
  { name: "Risk Settlements",         domain: "risksettlements.com",          searchContext: "litigation finance OR legal tech settlement funding",           enabled: true },
  { name: "Plant Prefab",             domain: "plantprefab.com",              searchContext: "prefab construction modular homes factory-built housing",        enabled: true },
  { name: "Built Robotics",           domain: "builtrobotics.com",            searchContext: "construction automation autonomous excavator robotics",          enabled: true },
  { name: "HEN Nozzles",              domain: "hennozzles.com",               searchContext: "industrial spray nozzle technology",                             enabled: true },
  { name: "FLEET Technologies",       domain: "fleet.com.au",                 searchContext: "fleet management rideshare Australia taxi app, formerly Ingogo", enabled: true },
  { name: "JuneShine",                domain: "juneshine.co",                 searchContext: "hard kombucha beverage alcohol brand",                           enabled: true },
  { name: "Frontline Wildfire",       domain: "frontlinewildfire.com",        searchContext: "wildfire detection technology fire prevention software",         enabled: true },
  { name: "Vibrant Planet",           domain: "vibrantplanet.net",            searchContext: "forest management climate tech land stewardship",                enabled: true },
  { name: "Stonehaven Incubate",      domain: "stonehavenincubate.com",       searchContext: "healthcare incubator medical startup",                           enabled: true },
  { name: "Formant",                  domain: "formant.io",                   searchContext: "robotics operations software robot fleet management, founders Bob Ciolino Travis Reitter", enabled: true },
  { name: "Paratus Clinical",         domain: "paratusclinical.com",          searchContext: "clinical trials healthcare medical research",                    enabled: true },
  { name: "Groundfloor Club",         domain: "groundfloorclub.com",          searchContext: "real estate crowdfunding investing platform",                    enabled: true },
  { name: "Hawkes Brewing",           domain: "hawkesbrewing.com",            searchContext: "craft beer brewery Australia",                                   enabled: true },
  { name: "Flame Security",           domain: "flamesecurity.com",            searchContext: "fire protection intumescent coating FIRECOAT, founders Justin Rooney Tony Overstead", enabled: true },
  { name: "Bio365",                   domain: "bio365.us",                    searchContext: "cannabis horticulture growing media soil amendment",             enabled: true },
  { name: "iEmulsions",               domain: "iemulsions.com",               searchContext: "emulsion technology advanced materials",                         enabled: true },
  { name: "Kaimarra Advanced Materials", domain: "kaimarra.com",              searchContext: "biodegradable bioplastics BioVeris reactive compatibilization", enabled: true },
  { name: "Plank Structural Systems", domain: "plankstructuralsystems.com",   searchContext: "prefab foundation construction system non-concrete, founder David Warner", enabled: true },
  { name: "Collaborative Aggregates", domain: "collaborativeaggregates.com",  searchContext: "asphalt rejuvenation pavement maintenance Delta product line",   enabled: true },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let results = {}; // name -> { status, items }
let isRunning = false;

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  renderConfigGrid();
}

function renderConfigGrid() {
  const grid = document.getElementById('configGrid');
  grid.innerHTML = COMPANIES.map((co, i) => `
    <div class="config-row">
      <div class="config-name">${co.name}<br><span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);font-weight:400;">${co.domain}</span></div>
      <input class="config-context" type="text" value="${escHtml(co.searchContext)}"
        oninput="COMPANIES[${i}].searchContext = this.value"
        placeholder="search context, founder names, products..." />
      <input class="config-enabled" type="checkbox" ${co.enabled ? 'checked' : ''}
        onchange="COMPANIES[${i}].enabled = this.checked" />
    </div>
  `).join('');
}

function toggleConfig() {
  const toggle = document.getElementById('configToggle');
  const body = document.getElementById('configBody');
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleNoNews() {
  const chips = document.getElementById('noNewsChips');
  const arrow = document.getElementById('noNewsArrow');
  chips.classList.toggle('open');
  arrow.textContent = chips.classList.contains('open') ? '▼' : '▶';
}

// ─── MAIN RUN ────────────────────────────────────────────────────────────────
async function runDigest() {
  if (isRunning) return;
  isRunning = true;
  results = {};

  const btn = document.getElementById('btnRun');
  const copyBtn = document.getElementById('btnCopy');
  const progressWrap = document.getElementById('progressWrap');
  const errorBanner = document.getElementById('errorBanner');
  const resultsEl = document.getElementById('results');
  const noNewsSection = document.getElementById('noNewsSection');

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:pulse 1s infinite">●</span> Running…';
  copyBtn.classList.remove('show');
  progressWrap.classList.add('show');
  errorBanner.classList.remove('show');
  resultsEl.innerHTML = '';
  noNewsSection.style.display = 'none';
  document.getElementById('runMeta').textContent = '';

  const active = COMPANIES.filter(c => c.enabled);
  let done = 0;

  for (const co of active) {
    setProgress(co.name, done, active.length);

    // Show loading card
    resultsEl.insertAdjacentHTML('beforeend', loadingCard(co.name));

    try {
      const items = await searchCompany(co);
      results[co.name] = items;
    } catch(e) {
      results[co.name] = { error: e.message };
    }

    done++;
    // Replace loading card with real result
    const loadingEl = document.querySelector(`[data-company="${escAttr(co.name)}"]`);
    if (loadingEl) loadingEl.outerHTML = renderCard(co.name, results[co.name]);
  }

  // Done
  setProgress('Done', active.length, active.length);
  progressWrap.classList.remove('show');
  isRunning = false;
  btn.disabled = false;
  btn.innerHTML = '<span>▶</span> Run Weekly Digest';

  // Render no-news section
  const noNews = active.filter(co => {
    const r = results[co.name];
    return !r || r.error || (Array.isArray(r) && r.length === 0);
  });
  if (noNews.length) {
    document.getElementById('noNewsCount').textContent = noNews.length;
    document.getElementById('noNewsChips').innerHTML = noNews.map(co =>
      `<span class="no-news-chip">${co.name}</span>`
    ).join('');
    noNewsSection.style.display = 'block';
  }

  // Run date
  const hasAny = active.some(co => Array.isArray(results[co.name]) && results[co.name].length > 0);
  document.getElementById('runMeta').textContent =
    `Run ${new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })}`;

  if (hasAny) copyBtn.classList.add('show');
}

function setProgress(label, done, total) {
  document.getElementById('progressLabel').textContent = `Searching: ${label}`;
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = `${Math.round((done/total)*100)}%`;
}

// ─── API CALL ────────────────────────────────────────────────────────────────
async function searchCompany(co) {
  const prompt = `Search for news mentions of "${co.name}" from the past 30 days.
Also search site:${co.domain} for any recent news, press releases, or blog posts from the past 30 days.
Additional search context to improve accuracy and avoid irrelevant results: ${co.searchContext}

Return results as a JSON array. Each item should have:
- "headline": the article title
- "publication": source name (e.g. TechCrunch, Reuters)
- "url": full URL
- "date": publication date as YYYY-MM-DD or approximate
- "summary": 2 sentences summarizing why this is relevant to the company

If no relevant news found in the past 7 days, return an empty array [].
Return ONLY valid JSON, no markdown, no preamble.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();

  // Extract the final text block (after tool use)
  const textBlocks = data.content.filter(b => b.type === 'text');
  if (!textBlocks.length) return [];

  const raw = textBlocks[textBlocks.length - 1].text.trim();
  const clean = raw.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/g, '').trim();

  try {
    const parsed = JSON.parse(clean);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) {
    // If Claude returned prose instead of JSON, treat as no results
    return [];
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function loadingCard(name) {
  return `<div class="result-card loading" data-company="${escAttr(name)}">
    <div class="result-header">
      <div class="result-co-name">${escHtml(name)}</div>
      <span class="result-badge badge-loading">SEARCHING</span>
    </div>
  </div>`;
}

function renderCard(name, items) {
  if (!Array.isArray(items) || items.length === 0) return ''; // will go to no-news

  const hasNews = items.length > 0;
  const isError = items && items.error;

  if (isError) {
    return `<div class="result-card no-news">
      <div class="result-header">
        <div class="result-co-name">${escHtml(name)}</div>
        <span class="result-badge badge-none">ERROR</span>
      </div>
      <div class="result-body" style="font-size:12px;color:var(--muted);">${escHtml(items.error)}</div>
    </div>`;
  }

  const itemsHtml = items.map((item, i) => `
    ${i > 0 ? '<hr class="news-divider" />' : ''}
    <div class="news-item">
      <div class="news-headline">
        ${item.url
          ? `<a href="${escAttr(item.url)}" target="_blank" rel="noopener">${escHtml(item.headline || 'Untitled')}</a>`
          : escHtml(item.headline || 'Untitled')}
      </div>
      <div class="news-source">${escHtml(item.publication || '')}${item.date ? ` · ${item.date}` : ''}</div>
      <div class="news-summary">${escHtml(item.summary || '')}</div>
    </div>
  `).join('');

  return `<div class="result-card has-news">
    <div class="result-header">
      <div class="result-co-name">${escHtml(name)}</div>
      <span class="result-badge badge-hits">${items.length} MENTION${items.length !== 1 ? 'S' : ''}</span>
    </div>
    <div class="result-body">${itemsHtml}</div>
  </div>`;
}

// ─── COPY EMAIL ──────────────────────────────────────────────────────────────
function copyEmail() {
  const btn = document.getElementById('btnCopy');
  const date = new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  const active = COMPANIES.filter(c => c.enabled);

  const withNews = active.filter(co => Array.isArray(results[co.name]) && results[co.name].length > 0);
  const noNews   = active.filter(co => !results[co.name] || (Array.isArray(results[co.name]) && results[co.name].length === 0));

  let body = `<div style="font-family:'IBM Plex Sans',Helvetica,Arial,sans-serif;max-width:640px;color:#111;">`;
  body += `<p style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#999;font-family:monospace;margin-bottom:4px;">Cthulhu Ventures LLC</p>`;
  body += `<h1 style="font-size:26px;font-weight:400;margin:0 0 4px;font-family:Georgia,serif;">Weekly <em style="color:#c9a84c;">News</em> Digest</h1>`;
  body += `<p style="font-size:12px;color:#888;margin:0 0 32px;">${date}</p>`;
  body += `<hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 28px;" />`;

  if (withNews.length === 0) {
    body += `<p style="font-size:13px;color:#888;">No portfolio company mentions found this week.</p>`;
  } else {
    for (const co of withNews) {
      const items = results[co.name];
      body += `<div style="margin-bottom:28px;">`;
      body += `<h2 style="font-size:15px;font-weight:600;margin:0 0 12px;color:#111;">${escHtml(co.name)}</h2>`;
      for (const item of items) {
        body += `<div style="margin-bottom:14px;padding-left:12px;border-left:2px solid #c9a84c;">`;
        body += `<p style="margin:0 0 2px;font-size:13px;font-weight:500;">`;
        body += item.url
          ? `<a href="${escAttr(item.url)}" style="color:#c9a84c;text-decoration:none;">${escHtml(item.headline || '')}</a>`
          : escHtml(item.headline || '');
        body += `</p>`;
        body += `<p style="margin:0 0 6px;font-size:11px;color:#999;font-family:monospace;">${escHtml(item.publication || '')}${item.date ? ` · ${item.date}` : ''}</p>`;
        body += `<p style="margin:0;font-size:12px;color:#444;line-height:1.65;">${escHtml(item.summary || '')}</p>`;
        body += `</div>`;
      }
      body += `</div>`;
    }
  }

  if (noNews.length > 0) {
    body += `<hr style="border:none;border-top:1px solid #e8e8e8;margin:24px 0 16px;" />`;
    body += `<p style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#bbb;font-family:monospace;margin-bottom:8px;">No mentions this week</p>`;
    body += `<p style="font-size:12px;color:#aaa;">${noNews.map(co => co.name).join(' · ')}</p>`;
  }

  body += `<hr style="border:none;border-top:1px solid #e8e8e8;margin:32px 0 16px;" />`;
  body += `<p style="font-size:10px;color:#bbb;font-family:monospace;">Generated by Cthulhu Ventures monthly news digest · ${date}</p>`;
  body += `</div>`;

  // Use clipboard API for HTML
  try {
    const blob = new Blob([body], { type: 'text/html' });
    const item = new ClipboardItem({ 'text/html': blob });
    navigator.clipboard.write([item]).then(() => {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = '<span>✉</span> Copy Email';
        btn.classList.remove('copied');
      }, 2000);
    });
  } catch(e) {
    // Fallback: plain text
    const plain = withNews.map(co => {
      const items = results[co.name];
      return `${co.name}\n${items.map(i => `  ${i.headline}\n  ${i.publication} · ${i.date}\n  ${i.summary}\n  ${i.url}`).join('\n\n')}`;
    }).join('\n\n---\n\n');
    navigator.clipboard.writeText(plain);
    btn.textContent = '✓ Copied (plain text)';
    setTimeout(() => { btn.innerHTML = '<span>✉</span> Copy Email'; }, 2000);
  }
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();
</script>
</body>
</html>
